# ============================================================
# HMC v2.1 – Home Assistant Integration
# ============================================================
# Diese Blöcke in deine configuration.yaml eintragen.
# Danach: Entwicklerwerkzeuge → YAML → Konfiguration neu laden
# (oder: sudo systemctl restart homeassistant)
# ============================================================


# ------------------------------------------------------------
# 1. REST Sensor – HMC Player Status
# ------------------------------------------------------------
# Pollt alle 10 Sekunden den HMC-Player.
# Liefert: sensor.hmc_player_state mit Attributen
#
# Verfügbare Attribute nach dem Laden:
#   state:               playing / paused / stopped / idle
#   current_track:       { name, duration, id, url, image }
#   position:            aktuelle Position in Sekunden
#   duration:            Gesamtlänge in Sekunden
#   total_tracks:        Anzahl Tracks in der Queue
#
# WICHTIG: IP-Adresse des Raspberry Pi anpassen!
# ------------------------------------------------------------

sensor:
  - platform: rest
    name: HMC Player State
    unique_id: hmc_player_state
    resource: http://192.168.178.XX:8000/player/state   # <-- IP anpassen!
    scan_interval: 10
    value_template: "{{ value_json.state }}"
    json_attributes:
      - current_track
      - position
      - duration
      - total_tracks
      - queue


# ------------------------------------------------------------
# 2. REST Commands – HMC Steuerung aus Home Assistant
# ------------------------------------------------------------
# Ermöglicht Pause / Resume / Stop aus Automationen und
# dem Lovelace-Dashboard heraus.
#
# WICHTIG: IP-Adresse anpassen (gleiche wie oben)!
# ------------------------------------------------------------

rest_command:
  hmc_pause:
    url: http://192.168.178.XX:8000/player/pause        # <-- IP anpassen!
    method: POST
    content_type: "application/json"

  hmc_resume:
    url: http://192.168.178.XX:8000/player/resume       # <-- IP anpassen!
    method: POST
    content_type: "application/json"

  hmc_stop:
    url: http://192.168.178.XX:8000/player/stop         # <-- IP anpassen!
    method: POST
    content_type: "application/json"

  hmc_next:
    url: http://192.168.178.XX:8000/player/next         # <-- IP anpassen!
    method: POST
    content_type: "application/json"

  hmc_previous:
    url: http://192.168.178.XX:8000/player/previous     # <-- IP anpassen!
    method: POST
    content_type: "application/json"


