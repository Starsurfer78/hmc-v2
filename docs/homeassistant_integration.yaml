# ============================================================
# 4. Automationen – bereits direkt in HA angelegt!
# ============================================================
# Folgende Automationen wurden automatisch erstellt:
#
#   automation.hmc_pause_bei_tts
#     → Pausiert HMC bei TTS-Durchsage, danach Resume
#     → Auslöser: Event "hmc_tts_start" mit data.message
#     → Beispielaufruf aus anderer Automation:
#
#       service: event.fire
#         event_type: hmc_tts_start
#         event_data:
#           message: "Das Abendessen ist fertig!"
#
#   automation.hmc_nachtmodus_stop
#     → Stoppt HMC automatisch um 20:00 Uhr
#     → Läuft nur wenn state = playing oder paused
#     → Uhrzeit in HA unter Automationen anpassen!
#
# ============================================================


# ============================================================
# 5. Schritte nach dem Eintragen
# ============================================================
#
# 1. IP-Adresse in ALLEN URLs oben anpassen
# 2. Konfiguration prüfen:
#    → Entwicklerwerkzeuge → YAML → "Konfiguration prüfen"
# 3. Neu laden:
#    → Entwicklerwerkzeuge → YAML → "REST-Befehle neu laden"
#    → Entwicklerwerkzeuge → YAML → "Template-Entitäten neu laden"
#    → oder einfach: Settings → System → Restart
# 4. Sensor prüfen:
#    → Entwicklerwerkzeuge → Zustände → "hmc" suchen
#    → sensor.hmc_player_state sollte erscheinen
# 5. Test:
#    → Entwicklerwerkzeuge → Dienste
#    → Dienst: rest_command.hmc_pause aufrufen
#    → HMC sollte pausieren
#
# ============================================================
